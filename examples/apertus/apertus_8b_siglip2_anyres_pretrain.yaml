model_yaml: examples/apertus/apertus_8b_siglip2_anyres.yaml
load_pretrained_components: true
model_kwargs:
  torch_dtype: bfloat16

data:
  data_path: data/LLaVA-Pretrain/blip_laion_cc_sbu_558k.json
  image_folder: data/LLaVA-Pretrain
  system_prompt: "You are a helpful language and vision assistant. You are able to understand the visual content that the user provides, and assist the user with a variety of tasks using natural language."

logging:
  preview_samples: 2

training:
  output_dir: checkpoints/apertus-8b-siglip2-anyres-pretrain-projector
  deepspeed: configs/deepspeed/zero2_bf16.json
  trainable_modules: projector
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  num_train_epochs: 1
  learning_rate: 1.0e-3
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  logging_steps: 10
  save_strategy: steps
  save_steps: 500
  save_total_limit: 2
  remove_unused_columns: false
  dataloader_num_workers: 4
  report_to: ["wandb"]
