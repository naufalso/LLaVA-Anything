model:
  model_type: llava_anything
  image_token: "<image>"
  vision_feature_layer: -2
  vision_feature_select_strategy: default
  projector_type: mlp2x_gelu
  projector_hidden_act: gelu

image:
  mode: anyres
  anyres:
    enabled: true
    grid_pinpoints:
      - [224, 224]
      - [224, 448]
      - [448, 224]
      - [448, 448]
      - [224, 672]
      - [672, 224]

text_model:
  name_or_path: swiss-ai/Apertus-8B-Instruct-2509
  trust_remote_code: false
  tokenizer:
    padding_side: left
    model_max_length: 8192

vision_model:
  backend: open_clip
  name_or_path: chs20/fare2-clip
  trust_remote_code: false
  image_processor:
    patch_size: 14
    num_additional_image_tokens: 1
