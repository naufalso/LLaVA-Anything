model:
  model_type: llava_anything
  image_token: "<image>"
  vision_feature_layer: -2
  vision_feature_select_strategy: full
  projector_type: mlp2x_gelu
  projector_hidden_act: gelu

image:
  mode: anyres
  anyres:
    enabled: true
    grid_pinpoints:
      - [384, 384]
      - [384, 768]
      - [768, 384]
      - [768, 768]
      - [384, 1152]
      - [1152, 384]

text_model:
  name_or_path: swiss-ai/Apertus-8B-Instruct-2509
  trust_remote_code: false
  tokenizer:
    padding_side: left
    model_max_length: 8192

vision_model:
  name_or_path: google/siglip2-so400m-patch14-384
  trust_remote_code: false
  image_processor:
    patch_size: 14
    num_additional_image_tokens: 0
